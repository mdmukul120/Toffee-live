name: Auto Update Toffee Playlist

on:
  schedule:
    # প্রতি ৫ মিনিট পরপর রান হবে
    - cron: '*/5 * * * *'
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # নির্দিষ্ট নাম না দিয়ে সব পরিবর্তন বা নতুন ফাইল ট্র্যাক করার জন্য git add .
          git add .
          
          # পরিবর্তন থাকলে তবেই কমিট ও পুশ করবে
          git diff --staged --quiet || (git commit -m "Auto update Toffee files [skip ci]" && git push)
